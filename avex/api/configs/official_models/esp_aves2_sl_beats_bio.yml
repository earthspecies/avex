---
# ESP-AVES2: Supervised/linear-probe BEATs (bio) model.
# Weights on Hugging Face Hub (safetensors). Load via hf:// URIs.
checkpoint_path: hf://EarthSpeciesProject/esp-aves2-sl-beats-bio/esp-aves2-sl-beats-bio.safetensors
class_mapping_path: hf://EarthSpeciesProject/esp-aves2-sl-beats-bio/label_map.json

model_spec:
  name: beats
  pretrained: false
  fine_tuned: true
  device: cuda
  init_config:
    activation_dropout: 0.0
    activation_fn: gelu
    attention_dropout: 0.0
    conv_bias: false
    conv_pos: 128
    conv_pos_groups: 16
    deep_norm: true
    dropout: 0.0
    dropout_input: 0.0
    embed_dim: 512
    encoder_attention_heads: 12
    encoder_embed_dim: 768
    encoder_ffn_embed_dim: 3072
    encoder_layerdrop: 0.05
    encoder_layers: 12
    finetuned_model: true
    gru_rel_pos: true
    input_patch_size: 16
    layer_norm_first: false
    layer_wise_gradient_decay_ratio: 0.6
    max_distance: 800
    num_buckets: 320
    predictor_class: 527
    predictor_dropout: 0.0
    relative_position_embedding: true
    sample_frequency: 16000.0
    num_mel_bins: 128
    frame_length: 25.0
    frame_shift: 10.0
    fbank_mean: 15.41663
    fbank_std: 6.55582
  audio_config:
    sample_rate: 16000
    representation: raw
    normalize: false
    target_length_seconds: 10
    window_selection: random
