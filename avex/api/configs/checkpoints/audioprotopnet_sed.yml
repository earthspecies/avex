---
# AudioProtoPNet SED (Sound Event Detection) variant.
# ConvNeXt-Base backbone + 2x bilinear add-on layers + spatial cosine prototype head.
#
# Checkpoint directory — three .pt files:
#   <checkpoint_dir>/config.pt
#   <checkpoint_dir>/backbone_state_dict.pt
#   <checkpoint_dir>/head_state_dict.pt
checkpoint_dir: gs://representation-learning/models/sed/audioprotopnet-20/

convnext_cfg:
  sample_rate: 32000
  n_fft: 2048
  hop_length: 256
  n_mels: 256
  norm_mean: -13.369
  norm_std: 13.162

model_spec:
  name: audioprotopnet_sed
  pretrained: true
  device: cuda
