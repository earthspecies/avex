# Official AudioProtoPNet-20 (HF BirdSet XCL) — linear probe on pre-classifier prototype activations.
# Dataset patched at launch (benchmark_beans_slurm.yml or benchmark_birdset.yml).
dataset_config: configs/data_configs/benchmark_beans.yml

training_params:
  train_epochs: 100
  lr: 0.001
  batch_size: 16
  optimizer: adamw
  weight_decay: 0.01
  amp: true
  amp_dtype: bf16

experiments:
  - run_name: audioprotopnet_20
    run_config: configs/run_configs/pretrained/audioprotopnet_20.yml
    pretrained: true
    probe_config:
      probe_type: linear
      target_layers: ["last_layer"]
      aggregation: "mean"
      input_processing: "pooled"
      freeze_backbone: true
      online_training: false

save_dir: evaluation_results/audioprotopnet
results_csv_path: evaluation_results/all_models_results.csv

device: cuda
seed: 42
num_workers: 4

eval_modes:
  - probe
  - retrieval
  - clustering

offline_embeddings:
  overwrite_embeddings: true
  probe_storage_aggregation: mean
