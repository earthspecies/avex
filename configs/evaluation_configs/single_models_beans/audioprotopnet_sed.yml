# AudioProtoPNet SED — linear probe on pre-classifier prototype activations.
# Dataset is patched at launch time (benchmark_beans.yml or benchmark_birdset.yml).
dataset_config: configs/data_configs/benchmark_beans.yml

training_params:
  train_epochs: 100
  lr: 0.001
  batch_size: 16
  optimizer: adamw
  weight_decay: 0.01
  amp: true
  amp_dtype: bf16

experiments:
  - run_name: audioprotopnet_sed
    run_config: configs/run_configs/pretrained/audioprotopnet_sed.yml
    pretrained: true
    probe_config:
      probe_type: linear
      target_layers: ["last_layer"]
      aggregation: "mean"
      input_processing: "pooled"
      freeze_backbone: true
      online_training: false

save_dir: evaluation_results/audioprotopnet_sed
results_csv_path: evaluation_results/all_models_results.csv

device: cuda
seed: 42
num_workers: 4

eval_modes:
  - probe
  - retrieval
  - clustering

offline_embeddings:
  # Keep existing H5s on disk; only bump cache for fast probe training.
  overwrite_embeddings: false
  # Stored in H5 attrs; for SED last_layer the model max-pools prototype activations
  # per clip (see audioprotopnet_sed._extract_pre_classifier_embeddings), not raw [B,T,D].
  probe_storage_aggregation: mean
  # Chunked HDF5 write (hybrid streaming) — avoids OOM on large sets (e.g. hainan_gibbons).
  use_streaming_embeddings: true
  memory_limit_gb: 8
  streaming_chunk_size: 1000
  # Probe bottleneck is random HDF5 reads, not LZF vs gzip. "none" = uncompressed on disk.
  hdf5_compression: none
  hdf5_compression_level: 1
  auto_chunk_size: true
  max_chunk_size: 2000
  min_chunk_size: 100
  batch_chunk_size: 10
  # Probe: load full splits into RAM (hainan train+val+test ~46 GB). Match jobs --mem.
  cache_size_limit_gb: 58.0
