---
model_spec:
  name: clip
  pretrained: true
  audio_config:
    sample_rate: 16000
    n_fft: 800
    hop_length: 160
    win_length: 800
    window: hann
    n_mels: 128
    representation: mel_spectrogram
    normalize: false
    target_length_seconds: 10
    window_selection: random
  text_model_name: roberta-base
  projection_dim: 512
  temperature: 0.07
  # Initialize the EfficientNet feature extractor from the ESP bioacoustics
  # backbone (overrides the default ImageNet weights).
  audio_encoder_init_from: esp_aves2_effnetb0_all

dataset_config: configs/data_configs/clap/data_chain_synthetic_xc_inat.yml

label_type: text

preprocessing: null
sr: 16000
debug_mode: false

logging: wandb
output_dir: "./runs/clap/clap_chain_synthetic_xc_inat"

training_params:
  train_epochs: 50
  lr: 0.0001
  batch_size: 300
  optimizer: adamw8bit
  weight_decay: 0.01
  amp: true
  amp_dtype: bf16
  log_steps: 100
  gradient_checkpointing: true

scheduler:
  name: cosine
  warmup_steps: 2000
  min_lr: 1e-6

augmentations: []

loss_function: contrastive

device: cuda

seed: 13
num_workers: 7
run_name: clap_chain_synthetic_xc_inat
wandb_project: avex
